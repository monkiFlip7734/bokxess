<!-- Тег для браузера, который сообщает, на каком языке написан документ-->
<!DOCTYPE html>
<!-- Внутри тега <html> хранится вся информация о документе -->
<html lang="ru">
<!-- Служебные данные для браузера -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokxess</title>
    <link rel="stylesheet" href="indexstyle.css">
</head>
<!-- Видимая часть документа -->

<body>
    <header class="header">
        <div class="container">
            <div class="header-box">
                <div class="header-logo logo">
                    <img src="./foot_pics/logo.svg" alt="logo">
                </div>
                <div class="header-controls">
                    controls
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            container
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-box">
                <div class="footer-logo logo">
                    <img src="./foot_pics/logo.svg" alt="logo">
                </div>
                <div class="footer-nav">
                    5
                </div>
                <div class="footer-social">
                    7
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
